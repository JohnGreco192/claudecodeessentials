name: NVDA Bear Morning Hunt

on:
  schedule:
    - cron: "14 13 * * 1"   # Monday    9:14am EDT
    - cron: "47 13 * * 2"   # Tuesday   9:47am EDT
    - cron: "5 13 * * 3"    # Wednesday 9:05am EDT
    - cron: "33 13 * * 4"   # Thursday  9:33am EDT
    - cron: "52 13 * * 5"   # Friday    9:52am EDT
  workflow_dispatch:
    inputs:
      skip_delay:
        description: 'Skip startup delay and random skip (for testing)'
        type: boolean
        default: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai requests httpx upstash-vector -q

      - name: Hunt bull targets pre-market
        working-directory: week0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
          SKIP_STARTUP_DELAY: ${{ inputs.skip_delay }}
        run: python3 morning_hunt.py

      - name: Persist MEMORY.md state
        if: always()
        run: |
          git config user.name "nvda_regard"
          git config user.email "actions@github.com"
          git add "week0/MEMORY.md"
          git diff --cached --quiet || git commit -m "chore: update MEMORY.md [skip ci]"
          git push
