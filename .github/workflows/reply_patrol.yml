name: NVDA Bear Reply Patrol

on:
  schedule:
    - cron: "22 15 * * 1"   # Monday    11:22am EDT
    - cron: "11 16 * * 2"   # Tuesday   12:11pm EDT
    - cron: "44 15 * * 3"   # Wednesday 11:44am EDT
    - cron: "7 16 * * 4"    # Thursday  12:07pm EDT
    - cron: "38 16 * * 5"   # Friday    12:38pm EDT
  workflow_dispatch:
    inputs:
      skip_delay:
        description: 'Skip startup delay and random skip (for testing)'
        type: boolean
        default: false

jobs:
  patrol:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai requests httpx upstash-vector -q

      - name: Patrol for replies and fire back
        working-directory: week0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
          SKIP_STARTUP_DELAY: ${{ inputs.skip_delay }}
        run: python3 reply_patrol.py

      - name: Persist MEMORY.md state
        if: always()
        run: |
          git config user.name "nvda_regard"
          git config user.email "actions@github.com"
          git add "week0/MEMORY.md"
          git diff --cached --quiet || git commit -m "chore: update MEMORY.md [skip ci]"
          git push
