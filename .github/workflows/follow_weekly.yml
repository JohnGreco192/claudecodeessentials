name: NVDA Bear Weekly Follow Scan

on:
  schedule:
    - cron: "23 14 * * 1"   # Monday 10:23am EDT
  workflow_dispatch:

jobs:
  follow:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify OpenClaw bootstrap files
        working-directory: "Week 0"
        run: |
          [ -f SOUL.md ]   && echo "✅ SOUL.md"   || (echo "❌ SOUL.md missing"   && exit 1)
          [ -f MEMORY.md ] && echo "✅ MEMORY.md" || (echo "❌ MEMORY.md missing" && exit 1)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai requests httpx upstash-vector -q

      - name: Run weekly follower scan
        working-directory: "Week 0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
        run: python follow_weekly.py

      - name: Persist state
        if: always()
        run: |
          git config user.name "nvda_regard"
          git config user.email "actions@github.com"
          git add "Week 0/MEMORY.md" "Week 0/follow_log.json"
          git diff --cached --quiet || git commit -m "chore: follow_weekly run [skip ci]"
          git push
