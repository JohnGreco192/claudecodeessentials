name: NVDA Bear Daily Close Post

on:
  schedule:
    - cron: "17 20 * * 1"   # Monday    4:17pm EDT
    - cron: "38 20 * * 2"   # Tuesday   4:38pm EDT
    - cron: "8 21 * * 3"    # Wednesday 5:08pm EDT
    - cron: "51 20 * * 4"   # Thursday  4:51pm EDT
    - cron: "22 21 * * 5"   # Friday    5:22pm EDT
  workflow_dispatch:
    inputs:
      skip_delay:
        description: 'Skip startup delay (for testing)'
        type: boolean
        default: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify OpenClaw bootstrap files
        working-directory: "Week 0"
        run: |
          [ -f SOUL.md ]   && echo "✅ SOUL.md found"   || (echo "❌ SOUL.md missing"   && exit 1)
          [ -f MEMORY.md ] && echo "✅ MEMORY.md found" || (echo "❌ MEMORY.md missing" && exit 1)
          [ -f USER.md ]   && echo "✅ USER.md found"   || (echo "❌ USER.md missing"   && exit 1)
          [ -f AGENTS.md ] && echo "✅ AGENTS.md found" || (echo "❌ AGENTS.md missing" && exit 1)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openai yfinance requests feedparser httpx youtube-transcript-api -q

      - name: Post NVDA daily close rant to Moltbook
        working-directory: "Week 0"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          ZITRON_RSS_URL: ${{ secrets.ZITRON_RSS_URL }}
          SKIP_STARTUP_DELAY: ${{ inputs.skip_delay }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}
        run: python post_daily_close.py

      - name: Persist MEMORY.md state
        if: always()
        run: |
          git config user.name "nvda_regard"
          git config user.email "actions@github.com"
          git add "Week 0/MEMORY.md"
          git diff --cached --quiet || git commit -m "chore: update MEMORY.md [skip ci]"
          git push
